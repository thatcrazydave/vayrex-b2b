name: PR Checks

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Run linting
        run: npm run lint
      
      - name: Check for console.log
        run: |
          echo "  Checking for debug console.log statements..."
          if grep -r "console\.log" src/ backend/ --include="*.js" --include="*.jsx" | grep -v "console.error\|console.warn"; then
            echo " Found console.log statements - please remove debug logs"
            exit 1
          else
            echo " No debug console.log statements found"
          fi

  changes-check:
    name: Changes Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for breaking changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend-api:
              - 'backend/routes/**'
              - 'backend/models/**'
            database:
              - 'backend/config/database.js'
              - 'backend/models/**'
            security:
              - 'backend/middleware/auth.js'
              - 'backend/security/**'
      
      - name: Notify about API changes
        if: steps.changes.outputs.backend-api == 'true'
        run: echo "  API routes modified - ensure documentation is updated"
      
      - name: Notify about database changes
        if: steps.changes.outputs.database == 'true'
        run: echo "  Database schema modified - migration scripts may be needed"
      
      - name: Notify about security changes
        if: steps.changes.outputs.security == 'true'
        run: echo "  Security changes detected - requires security review"

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install frontend dependencies
        run: npm ci
      
      - name: Build frontend
        run: npm run build
      
      - name: Check build size
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "  Frontend build size: $SIZE"
      
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Validate backend
        working-directory: ./backend
        run: node -c server.js

  dependency-update:
    name: Dependency Update Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Detect dependency updates
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            frontend-deps:
              - 'package.json'
            backend-deps:
              - 'backend/package.json'
      
      - name: Warn about package updates
        if: steps.changes.outputs.frontend-deps == 'true' || steps.changes.outputs.backend-deps == 'true'
        run: |
          echo "  Dependencies updated"
          echo "Please ensure all tests pass and breaking changes are documented"

  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: ' **CI Checks Running**\n\nAll automated checks have been triggered. Please wait for results.\n\n- Linting\n- Build validation\n- Security scan\n- Dependency checks'
            })

name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Lint check
        run: npm run lint
      
      - name: Build frontend
        run: npm run build
      
      - name: Validate backend
        working-directory: ./backend
        run: node -c server.js

  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: test-and-build
    if: success()
    steps:
      - uses: actions/checkout@v4
      
      - name: Notify deployment start
        run: |
          echo " Starting staging deployment..."
          echo "Branch: develop"
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      
      - name: Build frontend
        run: npm ci && npm run build
      
      - name: Prepare backend
        working-directory: ./backend
        run: npm ci
      
      - name: Upload frontend to staging
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          STAGING_S3_BUCKET: ${{ secrets.STAGING_S3_BUCKET }}
        run: |
          echo "  Frontend build ready for staging deployment"
          echo "Note: Configure AWS credentials in GitHub secrets for actual S3 upload"
          ls -lah dist/
      
      - name: Deploy backend to staging
        env:
          STAGING_SERVER_URL: ${{ secrets.STAGING_SERVER_URL }}
          STAGING_DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
        run: |
          echo " Backend deployment configuration ready"
          echo "Note: Configure deployment secrets in GitHub for actual backend deployment"
      
      - name: Run smoke tests
        run: |
          echo " Running post-deployment smoke tests"
          echo "Note: Add actual smoke test scripts here"
      
      - name: Notify deployment completion
        if: success()
        run: |
          echo " Staging deployment successful!"
          echo "Deployed: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      
      - name: Notify deployment failure
        if: failure()
        run: |
          echo " Staging deployment failed!"
          exit 1
